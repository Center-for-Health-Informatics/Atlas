<div class="multi-select">
    <!-- ko if: multiple == true -->
        <select class="form-select" multiple data-bind="disable: disable, selectedOptions: selectedValues, options: optionVals, optionsText: optionsText, attr: { size: selectSize }"></select>
    <!-- /ko -->
    <!-- ko if: multiple == false -->
        <select class="form-select" data-bind="disable: disable, options: options, value: selectedValue, optionsText: 'label', optionsValue: 'value'"></select>
    <!-- /ko -->
</div>
